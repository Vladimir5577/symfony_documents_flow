# nginx-кэш перед imgproxy.
#
# imgproxy ресайзит картинку на лету и НИЧЕГО не кэширует сам. Этот nginx хранит
# готовые ответы imgproxy на диске и отдаёт их повторно без обращения к imgproxy
# (воспроизводит то, что LiipImagine раньше делал через public/media/cache).
# См. dev_docks/microservices/Readme_kanban_to_do.txt, раздел 8.9.
#
# Поток: браузер -> сюда (кэш) -> [промах] imgproxy -> MinIO.

# Зона кэша на диске: 10м памяти под ключи, до 5Г файлов, чистка через 7 дней.
proxy_cache_path /var/cache/nginx/imgproxy
    levels=1:2
    keys_zone=imgproxy_cache:10m
    max_size=5g
    inactive=7d
    use_temp_path=off;

upstream imgproxy_upstream {
    server imgproxy:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Разумный лимит на размер ответа картинки.
    client_max_body_size 1m;

    location / {
        proxy_pass http://imgproxy_upstream;
        proxy_set_header Host $host;

        # --- Кэширование ---
        proxy_cache imgproxy_cache;
        # Кэшируем успешные ответы; кэш-ключ — полный URI (он включает параметры
        # ресайза и путь к исходнику, т.е. уникален на каждое превью).
        proxy_cache_key "$request_uri";
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        # Защита от «cache stampede»: при промахе только один запрос идёт в
        # imgproxy, остальные ждут результат.
        proxy_cache_lock on;
        # Если imgproxy недоступен/ошибся — отдаём устаревший кэш, если есть.
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;

        # Видно в ответе: HIT / MISS / EXPIRED — удобно для отладки.
        add_header X-Cache-Status $upstream_cache_status;

        # Браузерный кэш на сутки.
        expires 1d;
        add_header Cache-Control "public";
    }

    # Healthcheck nginx (не проксируется).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
