; ============================================================
; Кастомные настройки PHP-FPM пула.
; Применяются ПОСЛЕ www.conf из образа и переопределяют его.
; Префикс zz- гарантирует, что файл читается последним.
; ============================================================

[www]

; Количество воркеров.
; Сервер 16 ГБ RAM, ~120 МБ пиковой памяти на воркер.
; max_children = 20 => потолок ~2.4 ГБ под FPM. Запас на postgres и спайки большой.
; Старый дефолт был 5 — этого хватало максимум на 5 одновременных запросов.
pm = dynamic
pm.max_children      = 20
pm.start_servers     = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 8

; Перезапуск воркера каждые 500 запросов — страховка от утечек памяти.
; Дефолт = 0 (никогда не перезапускать) опасен для долгоживущих процессов.
pm.max_requests      = 500
