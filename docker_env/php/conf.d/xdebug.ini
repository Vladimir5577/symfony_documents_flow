zend_extension=xdebug

[xdebug]
; Режим работы Xdebug.
; off            — расширение загружено, но ничего не делает (минимум оверхеда, быстрая работа FPM).
; develop,debug  — полноценная отладка через IDE (медленнее в 2-3 раза).
; Для переключения: закомментировать одну строку, раскомментировать другую,
; затем перезапустить контейнер: docker compose restart php
xdebug.mode=off
; xdebug.mode=develop,debug

xdebug.client_host=host.docker.internal
xdebug.start_with_request=yes
xdebug.log=/tmp/xdebug.log

xdebug.discover_client_host = 1
