security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User\User
                property: login

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        refresh_jwt:
            pattern: ^/spa/api/(token/refresh|logout)
            stateless: true
            refresh_jwt:
                check_path: /spa/api/token/refresh
                invalidate_token_on_logout: true
            logout:
                path: /spa/api/logout
        spa_api:
            pattern: ^/spa/api
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /spa/api/login_check
                username_path: login
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            jwt: ~
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                username_parameter: _username
                password_parameter: _password
            logout:
                path: app_logout
                # where to redirect after logout
                # target: app_any_route

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Иерархия ролей: роли наследуют права друг друга
    # ROLE_ADMIN автоматически имеет все права ROLE_HR и ROLE_USER
    # ROLE_HR автоматически имеет все права ROLE_USER
    role_hierarchy:
        ROLE_ADMIN: [ROLE_MANAGER_ANALYTIC, ROLE_MANAGER_HR, ROLE_WORK_CITIZEN_APPEAL, ROLE_MANAGER, ROLE_MODERATOR, ROLE_ANALYTIC, ROLE_HR, ROLE_USER]
        ROLE_MANAGER_ANALYTIC: [ROLE_MANAGER, ROLE_MODERATOR, ROLE_ANALYTIC, ROLE_USER]
        ROLE_MANAGER_HR: [ROLE_MANAGER, ROLE_MODERATOR, ROLE_ANALYTIC, ROLE_HR, ROLE_USER]
        ROLE_MANAGER_WORK_CITIZEN_APPEAL: [ROLE_MANAGER, ROLE_MODERATOR, ROLE_WORK_CITIZEN_APPEAL, ROLE_USER]
        ROLE_MANAGER: [ROLE_MODERATOR, ROLE_USER]
        ROLE_ANALYTIC: ROLE_USER
        ROLE_WORK_CITIZEN_APPEAL: ROLE_USER
        ROLE_HR: ROLE_USER
        ROLE_MODERATOR: ROLE_USER  # Если нужна отдельная роль редактора

    # Note: Only the *first* matching rule is applied
    # Правила применяются сверху вниз, первое совпадение используется
    #
    # Рекомендация: используйте IsGranted в контроллерах для защиты конкретных методов
    # access_control лучше использовать только для публичных роутов
    access_control:
        # Публичные роуты (доступны всем, включая неаутентифицированных)
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/save_docx, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS } # корневой путь - редирект на /login

        # SPA API: выдача и обновление JWT — публичные эндпоинты
        - { path: ^/spa/api/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/spa/api/token/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/spa/api/logout, roles: PUBLIC_ACCESS }
        # Все остальные роуты SPA API требуют валидный JWT
        - { path: ^/spa/api, roles: ROLE_USER }

        # Обращения граждан: только профильная роль (и ROLE_ADMIN через role_hierarchy)
        - { path: ^/citizen-appeal, roles: ROLE_WORK_CITIZEN_APPEAL }


        # Все остальные роуты требуют аутентификации
        # Конкретные права доступа настраиваются через IsGranted в контроллерах
        - { path: ^/register, roles: ROLE_MODERATOR }
        - { path: ^/dashboard, roles: ROLE_USER }
        - { path: ^/, roles: ROLE_USER } # этот урл должен быть в конце (catch-all для всех остальных путей)

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
