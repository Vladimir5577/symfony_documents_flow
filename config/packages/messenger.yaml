framework:
    messenger:
        failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'
            # sync: 'sync://'

            # --- Межсервисная шина событий (RabbitMQ) ---
            # Topic exchange 'events': общий на весь проект.
            # Каждый микросервис создаёт СВОЮ очередь и биндит нужные routing keys.
            # Symfony публикует с routing key из stamps (см. UserSyncMessage).
            event_bus:
                dsn: '%env(RABBITMQ_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: events
                        type: topic
                    queues:
                        # Очередь Symfony для чтения собственных событий (если нужно).
                        # Go-канбан создаст свою очередь 'kanban.user_sync' со своим биндингом.
                        symfony_events:
                            binding_keys:
                                - 'user.#'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
                    delay: 1000

        default_bus: messenger.bus.default

        buses:
            messenger.bus.default: []

        routing:
            Symfony\Component\Mailer\Messenger\SendEmailMessage: async
            Symfony\Component\Notifier\Message\ChatMessage: async
            Symfony\Component\Notifier\Message\SmsMessage: async

            # Межсервисная синхронизация пользователей → RabbitMQ
            App\Message\UserSyncMessage: event_bus
