liip_imagine:
    twig:
        mode: lazy
    templating: false
    resolvers:
        default:
            web_path:
                web_root: '%kernel.project_dir%/public'
                cache_prefix: 'media/cache'
    loaders:
        default:
            filesystem:
                data_root: '%kernel.project_dir%/public'
        post_uploads:
            filesystem:
                data_root: '%private_upload_dir_posts%'
    data_loader: default
    filter_sets:
        post_image_preview:
            data_loader: post_uploads
            quality: 85
            filters:
                thumbnail:
                    size: [400, 400]
                    mode: inbound
