# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # directories
    private_upload_dir: '%env(resolve:PRIVATE_UPLOAD_DIR)%'

    # kanban uploads
    private_upload_kanban_dir: '%env(resolve:PRIVATE_UPLOAD_KANBAN_DIR)%'

    # documents
    private_upload_dir_documents_originals: '%env(resolve:PRIVATE_UPLOAD_DIR_DOCUMENTS_ORIGINALS)%'
    private_upload_dir_documents_updated: '%env(resolve:PRIVATE_UPLOAD_DIR_DOCUMENTS_UPDATED)%'
    private_upload_dir_documents_templates: '%env(resolve:PRIVATE_UPLOAD_DIR_DOCUMENTS_TEMPLATES)%'
    private_upload_dir_documents_comments: '%env(resolve:PRIVATE_UPLOAD_DIR_DOCUMENTS_COMMENTS)%'
    private_upload_dir_posts: '%env(resolve:PRIVATE_UPLOAD_DIR_POSTS)%'
    private_upload_dir_users: '%env(resolve:PRIVATE_UPLOAD_DIR_USERS)%'
    private_upload_dir_chats: '%env(resolve:PRIVATE_UPLOAD_DIR_CHATS)%'

    # onlyoffice url
    onlyoffice_document_server_url: '%env(resolve:ONLYOFFICE_DOCUMENT_SERVER_URL)%'

    # don snab api
    don_snab_api_url: '%env(resolve:DON_SNAB_API_URL)%'
    don_snab_api_key: '%env(resolve:DON_SNAB_API_KEY)%'

    # anthropic (claude) api
    anthropic_api_url:    '%env(resolve:ANTHROPIC_API_URL)%'
    anthropic_api_key:    '%env(resolve:ANTHROPIC_API_KEY)%'
    anthropic_model:      '%env(resolve:ANTHROPIC_MODEL)%'
    anthropic_max_tokens: '%env(int:ANTHROPIC_MAX_TOKENS)%'
    anthropic_timeout:    '%env(int:ANTHROPIC_TIMEOUT)%'
    anthropic_system_prompt: '%env(resolve:ANTHROPIC_SYSTEM_PROMPT)%'
    anthropic_history_limit: '%env(int:ANTHROPIC_HISTORY_LIMIT)%'
    ai_chat_render_limit:    '%env(int:AI_CHAT_RENDER_LIMIT)%'

    # ai chat uploads
    private_upload_dir_ai: '%env(resolve:PRIVATE_UPLOAD_DIR_AI)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\DataFixtures\:
        resource: '../src/DataFixtures/'
        tags: ['doctrine.fixture.orm']

    App\Service\Kanban\KanbanAttachmentService:
        arguments:
            $kanbanUploadDir: '%private_upload_kanban_dir%'

    App\Service\ApiExternal\CitizenAppeal\CitizenAppealApiService:
        arguments:
            $apiUrl: '%don_snab_api_url%'
            $apiKey: '%don_snab_api_key%'

    App\Service\ApiExternal\Vacancy\VacancyApiService:
        arguments:
            $apiUrl: '%don_snab_api_url%'
            $apiKey: '%don_snab_api_key%'

    App\Service\ApiExternal\ContractApplication\ContractApplicationApiService:
        arguments:
            $apiUrl: '%don_snab_api_url%'
            $apiKey: '%don_snab_api_key%'

    App\Service\AI\AnthropicClient:
        arguments:
            $apiUrl:        '%anthropic_api_url%'
            $apiKey:        '%anthropic_api_key%'
            $model:         '%anthropic_model%'
            $maxTokens:     '%anthropic_max_tokens%'
            $timeout:       '%anthropic_timeout%'
            $systemPrompt:  '%anthropic_system_prompt%'

    App\Controller\Api\AI\AiChatApiController:
        arguments:
            $historyLimit:       '%anthropic_history_limit%'
            $privateUploadDirAi: '%private_upload_dir_ai%'
        tags: ['controller.service_arguments']

    App\Controller\AI\AIController:
        arguments:
            $renderLimit: '%ai_chat_render_limit%'
        tags: ['controller.service_arguments']

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
