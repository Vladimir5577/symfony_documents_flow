# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # directories
    private_upload_dir: '%env(resolve:PRIVATE_UPLOAD_DIR)%'

    # kanban uploads (legacy — для миграции; новые файлы идут в MinIO)
    private_upload_kanban_dir: '%env(resolve:PRIVATE_UPLOAD_KANBAN_DIR)%'

    # documents
    private_upload_dir_documents_originals: '%env(resolve:PRIVATE_UPLOAD_DIR_DOCUMENTS_ORIGINALS)%'
    private_upload_dir_documents_updated: '%env(resolve:PRIVATE_UPLOAD_DIR_DOCUMENTS_UPDATED)%'
    private_upload_dir_documents_templates: '%env(resolve:PRIVATE_UPLOAD_DIR_DOCUMENTS_TEMPLATES)%'
    private_upload_dir_documents_comments: '%env(resolve:PRIVATE_UPLOAD_DIR_DOCUMENTS_COMMENTS)%'
    private_upload_dir_posts: '%env(resolve:PRIVATE_UPLOAD_DIR_POSTS)%'
    private_upload_dir_users: '%env(resolve:PRIVATE_UPLOAD_DIR_USERS)%'
    private_upload_dir_chats: '%env(resolve:PRIVATE_UPLOAD_DIR_CHATS)%'

    # onlyoffice url
    onlyoffice_document_server_url: '%env(resolve:ONLYOFFICE_DOCUMENT_SERVER_URL)%'

    # don snab api
    don_snab_api_url: '%env(resolve:DON_SNAB_API_URL)%'
    don_snab_api_key: '%env(resolve:DON_SNAB_API_KEY)%'

    # kanban api
    kanban_internal_api_key: '%env(resolve:KANBAN_INTERNAL_API_KEY)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\DataFixtures\:
        resource: '../src/DataFixtures/'
        tags: ['doctrine.fixture.orm']

    # S3-клиент для MinIO (файловое хранилище канбан-вложений)
    Aws\S3\S3Client:
        arguments:
            -   version: 'latest'
                region: '%env(MINIO_REGION)%'
                endpoint: '%env(MINIO_ENDPOINT)%'
                use_path_style_endpoint: true
                credentials:
                    key: '%env(MINIO_ACCESS_KEY)%'
                    secret: '%env(MINIO_SECRET_KEY)%'

    App\Service\Kanban\KanbanAttachmentService:
        arguments:
            $s3: '@Aws\S3\S3Client'
            $bucket: '%env(MINIO_KANBAN_BUCKET)%'

    App\Service\Kanban\KanbanAttachmentPreviewUrlGenerator:
        arguments:
            $imgproxyCacheBaseUrl: '%env(IMGPROXY_CACHE_BASE_URL)%'
            $minioBucket: '%env(MINIO_KANBAN_BUCKET)%'

    App\Service\User\UserAvatarStorageService:
        arguments:
            $s3: '@Aws\S3\S3Client'
            $bucket: '%env(MINIO_USER_BUCKET)%'

    App\Service\User\UserAvatarUrlGenerator:
        arguments:
            $imgproxyCacheBaseUrl: '%env(IMGPROXY_CACHE_BASE_URL)%'
            $minioUserBucket: '%env(MINIO_USER_BUCKET)%'

    App\Service\ApiExternal\CitizenAppeal\CitizenAppealApiService:
        arguments:
            $apiUrl: '%don_snab_api_url%'
            $apiKey: '%don_snab_api_key%'

    App\Service\ApiExternal\Vacancy\VacancyApiService:
        arguments:
            $apiUrl: '%don_snab_api_url%'
            $apiKey: '%don_snab_api_key%'

    App\Service\ApiExternal\VacancyApplication\VacancyApplicationApiService:
        arguments:
            $apiUrl: '%don_snab_api_url%'
            $apiKey: '%don_snab_api_key%'

    App\Service\ApiExternal\ContractApplication\ContractApplicationApiService:
        arguments:
            $apiUrl: '%don_snab_api_url%'
            $apiKey: '%don_snab_api_key%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
